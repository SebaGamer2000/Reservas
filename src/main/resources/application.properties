spring.application.name=Reservas
server.port=8083
spring.datasource.url=jdbc:mysql://localhost:3306/reservas_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

logging.level.root=INFO
logging.level.com.Reservas=DEBUG

logging.file.name=logs/reservas.log


springdoc.swagger-ui.path=/swagger-ui.html
springdoc.hateoas.enabled=false
spring.autoconfigure.exclude=org.springdoc.core.configuration.SpringDocHateoasConfiguration

spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}
